name: Update RSS Feed

on:
  schedule:
    - cron: "0 */8 * * *"  # каждые 8 часов (UTC)

permissions:
  contents: write  # чтобы workflow мог пушить изменения

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch RSS feed
        run: |
          curl -L --fail --silent https://zavtracast.ru/podcast/feed?redirect=no -o feed.xml

      - name: Commit feed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add feed.xml
          git commit -m "Update feed" || echo "No changes"
          git push